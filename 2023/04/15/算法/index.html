<h4 id="1到100之间的偶数之和"><a href="#1到100之间的偶数之和" class="headerlink" title="1到100之间的偶数之和"></a>1到100之间的偶数之和</h4><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//方法一</span></span><br><span class="line"> <span class="type">var</span> <span class="variable">sum</span> <span class="operator">=</span><span class="number">0</span>;</span><br><span class="line"> <span class="keyword">for</span> (<span class="type">int</span> <span class="variable">i</span> <span class="operator">=</span> <span class="number">2</span>; i &lt;= <span class="number">100</span>; i+=<span class="number">2</span>) &#123;</span><br><span class="line">     sum+=i;</span><br><span class="line"> &#125;</span><br><span class="line"> System.out.println(sum);</span><br><span class="line"></span><br><span class="line"><span class="comment">//方法二</span></span><br><span class="line"> <span class="keyword">var</span> s=<span class="number">0</span>;</span><br><span class="line"> <span class="keyword">var</span> a=<span class="number">1</span>;</span><br><span class="line"> <span class="keyword">var</span> b=<span class="number">100</span>;</span><br><span class="line"> <span class="keyword">for</span> (; a &lt;= b; a++) &#123;</span><br><span class="line">     s+=a%<span class="number">2</span>==<span class="number">0</span>?a:<span class="number">0</span>;</span><br><span class="line"> &#125;</span><br><span class="line"> System.out.println(s);</span><br></pre></td></tr></table></figure>
<h4 id="逢七过"><a href="#逢七过" class="headerlink" title="逢七过"></a>逢七过</h4><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//方法一</span></span><br><span class="line"> <span class="keyword">for</span> (<span class="type">int</span> <span class="variable">i</span> <span class="operator">=</span> <span class="number">0</span>; i &lt; <span class="number">100</span>; i++) &#123;</span><br><span class="line">     <span class="keyword">if</span> (i % <span class="number">10</span> == <span class="number">7</span> || i / <span class="number">10</span> % <span class="number">10</span> == <span class="number">7</span> || i % <span class="number">7</span> == <span class="number">0</span>) &#123;</span><br><span class="line">         System.out.println(<span class="string">&quot;过&quot;</span>);</span><br><span class="line">         <span class="keyword">continue</span>;</span><br><span class="line">     &#125;</span><br><span class="line">     System.out.println(i);</span><br><span class="line"> &#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//方法二</span></span><br><span class="line"> <span class="keyword">for</span> (<span class="type">int</span> <span class="variable">i</span> <span class="operator">=</span> <span class="number">0</span>; i &lt; <span class="number">100</span>; i++) &#123;</span><br><span class="line">     <span class="type">String</span> <span class="variable">d</span> <span class="operator">=</span> (i % <span class="number">10</span> == <span class="number">7</span> || i / <span class="number">10</span> % <span class="number">10</span> == <span class="number">7</span> || i % <span class="number">7</span> == <span class="number">0</span> ? <span class="string">&quot;过&quot;</span> : String.valueOf(i));</span><br><span class="line"> System.out.println(d);</span><br><span class="line"> &#125;</span><br></pre></td></tr></table></figure>
<h4 id="求和"><a href="#求和" class="headerlink" title="求和"></a>求和</h4><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">List&lt;Integer&gt; list = List.of(<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>, <span class="number">4</span>, <span class="number">5</span>, <span class="number">6</span>);</span><br><span class="line">  <span class="type">var</span> <span class="variable">sm</span> <span class="operator">=</span><span class="number">0</span>;</span><br><span class="line">  <span class="keyword">for</span> (<span class="type">int</span> <span class="variable">i</span> <span class="operator">=</span> <span class="number">0</span>; i &lt; list.size(); i++) &#123;</span><br><span class="line">      sm+=list.get(i);</span><br><span class="line">  &#125;</span><br><span class="line">  System.out.println(sm);</span><br></pre></td></tr></table></figure>

ord">var</span> max=arr.length-<span class="number">1</span>;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">while</span> (<span class="literal">true</span>) &#123;</span><br><span class="line">        <span class="keyword">if</span> (min &gt; max) &#123;</span><br><span class="line">            <span class="keyword">return</span> -<span class="number">1</span>;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="type">int</span> <span class="variable">mid</span> <span class="operator">=</span>(min+max)/<span class="number">2</span>;</span><br><span class="line">        <span class="keyword">if</span> (arr[mid] &gt; number) &#123;</span><br><span class="line">            max=mid-<span class="number">1</span>;</span><br><span class="line">        &#125; <span class="keyword">else</span> <span class="keyword">if</span> (arr[mid] &lt; number) &#123;</span><br><span class="line">            min = mid + <span class="number">1</span>;</span><br><span class="line">        &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">            <span class="keyword">return</span> mid;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
